<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录中 - 打卡题管理工具</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "PingFang SC", sans-serif;
    background: #f5f5f5;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  .card {
    background: white;
    border-radius: 16px;
    padding: 44px 40px;
    width: 400px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    text-align: center;
  }
  .icon { font-size: 48px; margin-bottom: 16px; }
  h1 { font-size: 20px; font-weight: 600; color: #1a1a1a; margin-bottom: 8px; }
  .sub { color: #888; font-size: 14px; line-height: 1.6; margin-bottom: 32px; }

  /* 状态指示器 */
  .status-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    border-radius: 10px;
    background: #fafafa;
    border: 1px solid #eee;
    margin-bottom: 12px;
    text-align: left;
  }
  .status-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .dot-waiting { background: #f0a500; animation: pulse 1.4s ease-in-out infinite; }
  .dot-success { background: #22a855; }
  .dot-idle    { background: #ddd; }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.5; transform: scale(0.85); }
  }
  .status-text { font-size: 14px; color: #444; }
  .status-hint { font-size: 12px; color: #aaa; margin-top: 2px; }

  /* 进度条 */
  .progress-bar {
    height: 3px;
    background: #eee;
    border-radius: 2px;
    overflow: hidden;
    margin: 20px 0;
  }
  .progress-fill {
    height: 100%;
    background: #f0a500;
    border-radius: 2px;
    width: 0%;
    transition: width 0.4s ease;
  }

  .tip {
    font-size: 12px;
    color: #bbb;
    line-height: 1.7;
    margin-top: 20px;
  }

  .success-panel {
    display: none;
    padding: 16px;
    background: #f0fff4;
    border: 1px solid #c6f6d5;
    border-radius: 10px;
    color: #276749;
    font-size: 14px;
    margin-top: 16px;
  }
  .success-panel.show { display: block; }
</style>
</head>
<body>
<div class="card">
  <div class="icon" id="icon">📱</div>
  <h1 id="title">等待微信扫码</h1>
  <p class="sub" id="sub">已在新窗口打开接龙管家登录页<br>请用微信扫描二维码完成登录</p>

  <div class="status-row">
    <div class="status-dot dot-success"></div>
    <div>
      <div class="status-text">Chromium 浏览器已启动</div>
      <div class="status-hint">接龙管家登录页正在加载</div>
    </div>
  </div>

  <div class="status-row" id="scanRow">
    <div class="status-dot dot-waiting" id="scanDot"></div>
    <div>
      <div class="status-text" id="scanText">等待扫码...</div>
      <div class="status-hint" id="scanHint">请在弹出的浏览器窗口中用微信扫码</div>
    </div>
  </div>

  <div class="status-row" id="tokenRow" style="opacity:0.4">
    <div class="status-dot dot-idle" id="tokenDot"></div>
    <div>
      <div class="status-text">自动提取登录凭据</div>
      <div class="status-hint">登录成功后自动完成，无需手动操作</div>
    </div>
  </div>

  <div class="progress-bar">
    <div class="progress-fill" id="progress"></div>
  </div>

  <div class="success-panel" id="successPanel">
    ✅ 登录成功！正在跳转到主页...
  </div>

  <p class="tip" id="tip">
    首次登录需要扫码；之后 token 过期时，<br>
    浏览器会自动复用微信登录态，无需再次扫码
  </p>
</div>

<script>
let pollTimer = null;
let progressVal = 5;

// 启动进度条动画（纯视觉，不代表真实进度）
function tickProgress() {
  if (progressVal < 85) {
    progressVal += (85 - progressVal) * 0.015;
    document.getElementById('progress').style.width = progressVal + '%';
  }
}
const progressTimer = setInterval(tickProgress, 400);

// 轮询登录状态
async function poll() {
  try {
    const resp = await fetch('/api/auth/status');
    const data = await resp.json();

    if (data.logged_in) {
      // 登录成功
      clearInterval(progressTimer);
      clearInterval(pollTimer);

      document.getElementById('progress').style.width = '100%';
      document.getElementById('icon').textContent = '✅';
      document.getElementById('title').textContent = '登录成功';
      document.getElementById('sub').textContent = '正在跳转到主页...';
      document.getElementById('scanDot').className = 'status-dot dot-success';
      document.getElementById('scanText').textContent = '扫码成功';
      document.getElementById('scanHint').textContent = '微信登录态已确认';
      document.getElementById('tokenRow').style.opacity = '1';
      document.getElementById('tokenDot').className = 'status-dot dot-success';
      document.getElementById('successPanel').classList.add('show');
      document.getElementById('tip').style.display = 'none';

      setTimeout(() => window.location.href = '/', 1500);

    } else if (data.in_progress === false && !data.logged_in) {
      // Playwright 退出但没拿到 token（超时或出错）
      document.getElementById('scanDot').className = 'status-dot';
      document.getElementById('scanDot').style.background = '#e53e3e';
      document.getElementById('scanText').textContent = '登录超时，请刷新页面重试';
      document.getElementById('scanHint').textContent = '5 分钟内未完成扫码';
      clearInterval(pollTimer);
      clearInterval(progressTimer);
    }
  } catch(e) {
    // 网络错误，继续轮询
  }
}

// 每 2 秒轮询一次
pollTimer = setInterval(poll, 2000);
poll(); // 立即执行一次
</script>
</body>
</html>
